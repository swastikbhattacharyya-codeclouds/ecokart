<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoKart</title>
    <link href="src/style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="flex min-h-screen items-center justify-center bg-orange-50/50 px-4 font-[Karla] text-gray-800"
  >
    <div class="w-full max-w-xl rounded-md bg-white p-6 shadow-lg">
      <div class="flex flex-col items-center text-center">
        <div class="mb-4 text-4xl text-green-600">
          <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="mb-2 font-[Montserrat] text-2xl font-bold text-gray-900">
          Order Confirmed!
        </h1>
        <p class="mb-6 text-sm text-gray-600">
          Thank you for your purchase. Your order has been placed successfully.
        </p>
      </div>

      <div class="space-y-4 text-sm">
        <div>
          <h2 class="mb-1 font-bold text-gray-900">Customer Info</h2>
          <p>
            <span class="font-semibold">Name:</span> <span id="name">-</span>
          </p>
          <p>
            <span class="font-semibold">Email:</span> <span id="email">-</span>
          </p>
          <p>
            <span class="font-semibold">Phone:</span> <span id="phone">-</span>
          </p>
          <p>
            <span class="font-semibold">Address:</span>
            <span id="address">-</span>
          </p>
        </div>

        <div>
          <h2 class="mb-1 font-bold text-gray-900">Order Summary</h2>
          <p>
            <span class="font-semibold">Total:</span> &#8377;
            <span id="total">-</span>
          </p>
        </div>
      </div>

      <div class="mt-6 text-center">
        <a
          href="/"
          class="inline-block rounded-full bg-orange-600 px-6 py-2 font-bold text-white transition hover:bg-orange-500"
        >
          Return to Home
        </a>
      </div>
    </div>

    <script>
      function getParam(name) {
        const url = new URLSearchParams(window.location.search);
        return url.get(name) || "-";
      }

      document.getElementById("name").textContent = getParam("name");
      document.getElementById("email").textContent = getParam("email");
      document.getElementById("phone").textContent = getParam("phone");
      document.getElementById("address").textContent = getParam("address");
      document.getElementById("total").textContent = getParam("total");
    </script>
  </body>
</html>
