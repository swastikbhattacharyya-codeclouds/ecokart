<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoKart</title>
    <link href="src/style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="flex h-dvh flex-col overflow-hidden bg-orange-50/50 font-[Karla] text-gray-800"
  >
    <dialog
      id="order-review-dialog"
      class="top-1/2 left-1/2 w-[90dvw] max-w-[350px] -translate-x-1/2 -translate-y-1/2 rounded-md border border-gray-300 p-0 shadow-lg backdrop:bg-black/30 backdrop:backdrop-blur-lg"
    >
      <div class="relative flex max-h-[90dvh] flex-col">
        <button
          type="button"
          id="close-order-dialog"
          class="absolute top-[18px] right-3 z-50 text-gray-400 transition hover:text-gray-600"
          aria-label="Close"
        >
          <i class="fas fa-times text-lg"></i>
        </button>
        <div
          class="sticky top-0 border-b bg-white px-6 py-4 font-[Montserrat] text-lg font-bold text-gray-900 shadow"
        >
          Order Review
        </div>

        <div
          id="order-review-content"
          class="flex-1 space-y-6 overflow-y-auto px-6 py-4 text-sm text-gray-800"
        ></div>

        <div class="sticky bottom-0 border-t bg-white px-6 py-4 shadow">
          <button
            type="button"
            id="place-order-btn"
            class="w-full cursor-pointer rounded-full bg-orange-600 px-6 py-3 font-[Montserrat] font-bold text-white transition hover:bg-orange-500"
          >
            Place Order
          </button>
        </div>
      </div>
    </dialog>
    <header
      class="flex items-center gap-x-4 px-4 py-4 font-[Montserrat] text-xl font-bold text-gray-900"
    >
      <a
        href="javascript:history.back()"
        class="flex max-w-max items-center gap-2 rounded-full bg-white px-4 py-2 font-[Karla] text-sm text-gray-700 shadow-md transition hover:bg-gray-100"
      >
        <i class="fas fa-arrow-left"></i>
        Back
      </a>
      <div>Your Cart</div>
    </header>
    <div
      id="empty-cart"
      class="flex h-full items-center justify-center px-4 font-[Karla] text-2xl"
    >
      Your Cart is Empty
    </div>
    <main
      class="realtive h-full flex-1 px-4 max-sm:overflow-y-auto sm:flex sm:gap-4 sm:overflow-hidden sm:px-6"
    >
      <section
        id="cart-items"
        class="min-h-0 flex-1 space-y-4 pr-4 pb-2 sm:flex-[2] sm:overflow-y-auto"
      ></section>
      <aside
        id="checkout-form max-sm:py-4"
        class="overflow-y-auto px-4 max-sm:mb-4 max-sm:py-4 sm:block sm:flex-[1]"
      >
        <h2 class="text-lg font-bold text-gray-900">Delivery Details</h2>
        <form class="space-y-4 text-sm text-gray-700">
          <div>
            <label for="name" class="mb-1 block">Full Name</label>
            <input
              type="text"
              id="name"
              class="w-full rounded-md border border-gray-300 px-3 py-2 focus:ring-2 focus:ring-orange-500 focus:outline-none"
              placeholder="Swastik Bhattacharyya"
              required
            />
          </div>
          <div>
            <label for="email" class="mb-1 block">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              required
              class="w-full rounded-md border border-gray-300 px-3 py-2 focus:ring-2 focus:ring-orange-500 focus:outline-none"
              placeholder="example@email.com"
            />
          </div>
          <div>
            <label for="phone" class="mb-1 block">Phone</label>
            <input
              type="tel"
              id="phone"
              class="w-full rounded-md border border-gray-300 px-3 py-2 focus:ring-2 focus:ring-orange-500 focus:outline-none"
              placeholder="9149081244"
              required
              pattern="[0-9]{10}"
            />
          </div>
          <div>
            <label for="address" class="mb-1 block">Address</label>
            <textarea
              id="address"
              rows="3"
              class="w-full rounded-md border border-gray-300 px-3 py-2 focus:ring-2 focus:ring-orange-500 focus:outline-none"
              placeholder="123 Eco Street, Green City"
              required
              minlength="10"
            ></textarea>
          </div>
        </form>
      </aside>
    </main>
    <footer
      class="flex flex-col gap-4 border-t border-gray-200 bg-white px-6 py-4 sm:flex-row sm:items-center sm:justify-between"
    >
      <div class="space-y-1 text-sm text-gray-700">
        <div class="flex justify-between gap-[30dvw]">
          <span>Subtotal</span>
          <span>&#8377; <span id="cart-subtotal"></span></span>
        </div>
        <div class="flex justify-between gap-[30dvw]">
          <span>Tax</span>
          <span>&#8377; <span id="cart-tax"></span></span>
        </div>
        <div class="flex justify-between gap-[30dvw]">
          <span>Shipping</span>
          <span>&#8377; <span id="cart-shipping"></span></span>
        </div>
        <div
          class="flex justify-between gap-[30dvw] font-[Montserrat] text-base font-bold text-gray-900"
        >
          <span>Total</span>
          <span>&#8377; <span id="cart-total"></span></span>
        </div>
      </div>
      <button
        id="checkout-form-button"
        type="button"
        class="w-full cursor-pointer rounded-full bg-orange-600 px-8 py-3 font-[Montserrat] font-bold text-white transition hover:bg-orange-500 sm:w-auto"
      >
        Next
      </button>
    </footer>
    <script src="src/pages/checkout.ts" type="module"></script>
  </body>
</html>
