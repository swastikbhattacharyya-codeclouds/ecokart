<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EcoKart</title>
    <link href="src/style.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="flex min-h-dvh flex-col">
    <nav
      class="sticky top-0 z-50 flex h-16 items-center justify-between bg-orange-50/80 px-[10dvw] py-4 font-[Montserrat] shadow-xl backdrop-blur-sm"
    >
      <div class="w-[24px]"></div>
      <a href="/" class="text-xl font-bold text-gray-900">EcoKart</a>
      <div class="relative">
        <a
          href="/checkout"
          id="cart-button"
          class="cursor-pointer text-2xl text-gray-800 transition hover:text-orange-600"
          aria-label="Cart"
        >
          <i class="fas fa-shopping-cart"></i>
        </a>
        <span
          id="cart-count-badge"
          class="absolute -top-2 -right-2 flex h-5 w-5 items-center justify-center rounded-full bg-red-600 text-xs font-bold text-white"
        >
          0
        </span>
      </div>
    </nav>
    <main class="flex flex-grow flex-col px-8 pt-4 pb-8 md:pt-16">
      <section
        class="md:grid-rows-0 flex flex-grow flex-col gap-8 max-md:grid-rows-2 md:grid md:grid-cols-2"
      >
        <div
          class="relative w-full overflow-hidden rounded-lg max-md:aspect-square max-md:h-auto md:h-full"
        >
          <a
            href="javascript:history.back()"
            class="mb-2 flex max-w-max items-center gap-2 rounded-full bg-white px-4 py-2 font-[Karla] text-sm text-gray-700 shadow-md transition hover:bg-gray-100 md:hidden"
          >
            <i class="fas fa-arrow-left"></i>
            Back
          </a>
          <img
            id="image"
            class="absolute aspect-square w-full object-cover md:h-full"
          />
        </div>
        <div class="flex flex-col items-start gap-y-8">
          <a
            href="javascript:history.back()"
            class="items-center gap-2 rounded-full bg-white px-4 py-2 font-[Karla] text-sm text-gray-700 shadow-md transition hover:bg-gray-100 max-md:hidden md:flex"
          >
            <i class="fas fa-arrow-left"></i>
            Back
          </a>
          <div class="flex flex-col">
            <h1 id="title" class="font-[Montserrat] text-4xl font-bold">
              Product Title
            </h1>
            <p id="subtitle" class="font-[Karla] text-gray-700">
              Product Subtitle
            </p>
          </div>
          <div id="description" class="font-[Karla] lg:text-lg xl:text-xl">
            Product Description
          </div>
          <div
            id="price"
            class="font-[Karla] font-bold lg:text-xl xl:text-2xl"
          ></div>
          <div>
            <button
              class="add-to-cart-btn cursor-pointer rounded-full bg-orange-600 px-8 py-3 font-[Montserrat] font-bold text-white transition-[background] duration-200 hover:bg-orange-500 focus-visible:bg-orange-500"
            >
              Add to Cart
            </button>
          </div>
        </div>
      </section>
    </main>
    <footer class="bg-black py-4 text-center font-[Karla] text-white">
      &copy; 2025 EcoKart. Committed to sustainable and eco-friendly products.
      All rights reserved.
    </footer>
    <script type="module" src="src/pages/product.ts"></script>
  </body>
</html>
